name: SaveFunds CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: savefunds-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Test backend
        run: ./mvnw test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: savefunds-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: savefunds-frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Type-check frontend
        run: npx vue-tsc --build
      - name: Build frontend
        run: npm run build-only
        env:
          VITE_API_BASE_URL: http://localhost:8080
