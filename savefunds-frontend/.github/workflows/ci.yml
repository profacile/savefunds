name: Frontend CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx vue-tsc --build

      - name: Build
        run: npm run build-only
        env:
          VITE_API_BASE_URL: http://localhost:8080
