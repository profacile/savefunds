services:
  postgres:
    image: postgres:16-alpine
    container_name: savefunds-postgres
    environment:
      POSTGRES_DB: savefunds_db
      POSTGRES_USER: savefunds_user
      POSTGRES_PASSWORD: savefunds_pass
    ports:
      - "5433:5432"
    volumes:
      - savefunds-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savefunds_user -d savefunds_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  savefunds-postgres-data:
